<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integração Spring Boot</title>

    <!-- CSS -->

    <Style>

        body{
            font-family: Arial, sans-serif;
            background:  #f4f6f9;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            width: 400px;
        }
        h1{
            text-align: center;
            margin-bottom: 20px;
        }

        button{
            background:  #1976d2;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover{
            background-color:  #125aa3;
        }

        input{
            width: 100%;
            padding: 8px;
            margin-top: 10px;
        }

        .result-box{
            margin-top: 15px;
            padding: 10px;
            background: #eef2f7;
            border-radius:  5px;

        }

    </Style>

</head>
<body>
    <div class="container">
        <h1>Integração API </h1>

        <!-- GET -->
        <button onclick="buscarMensagem()"> Buscar Mensagem </button>
        <div id="resultado-get" class="result-box"></div>

        <!-- POST -->
        <input type="text" id="dados-input">
        <button onclick="enviarDados()"> Enviar </button>
        <div id="resultado-post" class="result-box"></div>
    </div>

    <script src = "/js/app.js"></script>
</body>

</html>
